                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                    {TOOLS_LIST.find(c => c.id === activeToolboxCat).items.map((tool, idx) => (
                                        <a key={idx} href={tool.url} target="_blank" className="p-6 bg-white border border-slate-200 rounded-3xl hover:shadow-xl hover:border-blue-400 transition-all shadow-sm flex flex-col justify-between group">
                                            <div>
                                                <div className="flex justify-between items-center mb-3">
                                                    <h4 className="font-bold text-lg group-hover:text-blue-600 transition-colors">{tool.name}</h4>
                                                    <Icon name="external-link" className="w-4 h-4 text-slate-300 group-hover:text-blue-500" />
                                                </div>
                                                <p className="text-sm text-slate-500 font-medium">{tool.desc}</p>
                                            </div>
                                        </a>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === 'workflows' && (
                            <div className="animate-in">
                                <div className="mb-12">
                                    <div className="flex items-center gap-3 mb-6">
                                        <div className="w-8 h-1 bg-blue-600 rounded-full" />
                                        <h2 className="text-3xl font-black tracking-tight uppercase">Workflows</h2>
                                    </div>
                                    <HorizontalNav items={WORKFLOW_GROUPS.map(g => ({ id: g.id, label: g.title, icon: g.icon }))} activeId={activeWorkflowGroup} onSelect={setActiveWorkflowGroup} />
                                </div>
                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-10">
                                    {WORKFLOW_GROUPS.find(g => g.id === activeWorkflowGroup).items.map((wf, idx) => (
                                        <div key={idx} className="bg-white p-8 rounded-[2.5rem] border border-slate-200 shadow-sm relative overflow-hidden h-full flex flex-col group hover:border-blue-400 transition-all">
                                            <h4 className="font-black text-2xl text-slate-900 mb-2 relative z-10">{wf.title}</h4>
                                            <p className="text-slate-500 text-sm italic mb-8 relative z-10 border-l-2 border-slate-100 pl-3">{wf.desc}</p>
                                            <div className="space-y-8 relative z-10 flex-grow">
                                                {wf.steps.map((step, sIdx) => (
                                                    <div key={sIdx} className="relative">
                                                        <div className="flex items-start gap-5">
                                                            <div className={`w-10 h-10 rounded-2xl ${activeWorkflowGroup === 'lehrkraefte' ? 'bg-blue-50' : 'bg-emerald-50'} flex items-center justify-center shrink-0 border border-current font-black text-sm`}>{sIdx + 1}</div>
                                                            <div className="flex-grow pt-1">
                                                                <div className="flex items-center gap-2 mb-1">
                                                                    <span className="text-sm font-black text-slate-900">{step.tool}</span>
                                                                    <div className="h-px bg-slate-100 flex-grow"></div>
                                                                </div>
                                                                <div className="text-xs font-bold text-blue-600 uppercase tracking-widest mb-2">{step.action}</div>
                                                                <p className="text-sm text-slate-500 font-medium bg-slate-50/50 p-3 rounded-xl border border-slate-100/50">{step.detail}</p>
                                                            </div>
                                                        </div>
                                                        {sIdx < wf.steps.length - 1 && <div className="absolute left-5 top-10 w-px h-10 bg-slate-100 ml-[-0.5px]"></div>}
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="bg-white border-t border-slate-200 py-16 mt-20">
                        <div className="max-w-7xl mx-auto px-6 text-center">
                            <div className="flex flex-col md:flex-row justify-between items-center gap-10 mb-12">
                                <div className="flex items-center gap-3">
                                    <div className="bg-slate-900 p-2 rounded-xl"><Icon name="sparkles" className="w-5 h-5 text-white" /></div>
                                    <span className="font-black text-xl tracking-tighter uppercase">KI-WERKSTATT</span>
                                </div>
                                <div className="flex gap-8 text-xs font-black text-slate-400 uppercase tracking-widest">
                                    <button onClick={() => setShowImpressum(true)} className="hover:text-blue-600">Impressum</button>
                                    <button onClick={() => setShowDatenschutz(true)} className="hover:text-blue-600">Datenschutz</button>
                                    <a href="mailto:cneugebauer@gmx.net" className="hover:text-blue-600 flex items-center gap-2"><Icon name="mail" className="w-4 h-4" /> Kontakt</a>
                                </div>
                            </div>
                            <p className="text-sm text-slate-500 font-black uppercase tracking-tight">Christian Neugebauer • Berufliche Schulen Bebra</p>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
