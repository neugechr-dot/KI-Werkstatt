<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">

        }

    <!-- Firebase SDKs für den Besuchercounter -->

    <script src="https://www.gstatic.com/firebasejs/11.1.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore-compat.js"></script>
    <!-- React & Utilities -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    </style>
</head>
<body class="bg-soft-cloud text-deep-slate font-sans antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        const Icon = ({ name, className }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name, className]);
            return <i data-lucide={name} className={className}></i>;
        };

        // --- SORTIERTE DATEN (Inklusive neuer Gems gemäß Dokument) ---
        const GEMS_DATA = [
            { id: 11, title: "Lernberater Abivorbereitung Wirtschaft", description: "Individuelles Coaching zum KCBG Hessen Wirtschaftslehre. Der Agent bewertet Kompetenzniveaus und gibt am Ende umfassendes Feedback zur Weiterarbeit.", link: "https://gemini.google.com/gem/1qHprW7Nc5ZKoG3eTU1zKMk38NG54p3jh?usp=sharing", category: "Lernen", icon: "book-open" },
            { id: 1, title: "Politikzyklus interaktiv", description: "Sokratischer Tutor zur tiefgehenden Analyse politischer Konflikte. Er bietet eine strukturierte Begleitung inklusive Bewertung und Dokumentation.", link: "https://gemini.google.com/gem/1l0xsAtu7zm0S099P9w_Q7OV-J_DZRuWz?usp=sharing", category: "Politik", icon: "scale" },
            { id: 13, title: "Dashboard Creator", description: "Das GEM baut unterrichtsbegleitende Dashboards nach vorgegebenen Parametern und bietet viele Gestaltungsoptionen aktiv an.", link: "https://gemini.google.com/gem/1xd-DH2PmOlBKxQCENbPjUtGgXMfFOl7G?usp=sharing", category: "Tools", icon: "layout-template" },
            { id: 14, title: "Prompting Trainer", description: "Hilft bei der Verbesserung und Präzisierung von Prompts auf Basis eines Themas oder Problems, um grundlegende Prompting-Skills zu entwickeln.", link: "https://gemini.google.com/gem/1S6os6k2KTlk-sLnkCN6UjsL1sxoyTkGA?usp=sharing", category: "Tools", icon: "terminal" },
            { id: 15, title: "Historischer Unterrichtseinstieg", description: "Sucht nach historischen Ereignissen zum aktuellen Datum, die mit deinem Stundenthema verknüpft werden können, für spannende und andere Unterrichtseinstiege.", link: "https://gemini.google.com/gem/1qrn4_17BctTizkFf9nhCLSNGf1BtwNI0?usp=sharing", category: "Tools", icon: "history" },
            { id: 16, title: "Infoblatt Ersteller", description: "Hilft bei der Erstellung von Infoblättern, um theoretische Inhalte in der gewünschten Ausführlichkeit und Tiefe abzubilden.", link: "https://gemini.google.com/gem/1bauvJLYWkqqIVt9L5XsKa9OPGypOIGIz?usp=sharing", category: "Tools", icon: "file-text" },
            { id: 2, title: "Gem Generator", description: "Promptinghilfe zur Gestaltung von individuellen GEM-Agenten im Bildungssektor (Vielen Dank an Edugems.com).", link: "https://gemini.google.com/gem/1kH_2yF6lW2tWSzOV9Wr-7VZ_98-F960J?usp=sharing", category: "Tools", icon: "wand-2" },
            { id: 3, title: "Sokratischer Lerncoach", description: "Allgemeiner Sokratischer Tutor, der streng auf Hilfe zur Ergebnisfindung statt Produktion von Lösungen achtet.", link: "https://gemini.google.com/gem/1GPMWpVcJWotJDIrCT-eDfSJpSPhgnGBy?usp=sharing", category: "Lernen", icon: "graduation-cap" },
            { id: 4, title: "Economics Mastermind", description: "Spezielles Tool zur Planung des Unterrichtes im Fach Wirtschaftslehre in Hessen (KCBG für Berufliche Gymnasien).", link: "https://gemini.google.com/gem/1hiBFrtNI8BFddMWcL-LZRTGj_G7_pyMT?usp=sharing", category: "Wirtschaft", icon: "trending-up" },
            { id: 5, title: "Vertretungsstunden Planer", description: "Tool zur schnellen Planung von (fachfremden) Vertretungsstunden unter Einbeziehung der Schüler.", link: "https://gemini.google.com/gem/1GHdiLM6HsIP8vLgGZ3XpUfQxlpDyfEwj?usp=sharing", category: "Schulalltag", icon: "clock" },
            { id: 6, title: "Politics Mastermind", description: "Spezielles Tool zur Planung des Unterrichtes im Fach Politik und Wirtschaft in Hessen (KCGO).", link: "https://gemini.google.com/gem/11ngV6770tGKIeCDmR9dMnK-sW4qFqUrn?usp=sharing", category: "Politik", icon: "landmark" },
            { id: 7, title: "Nexus politischer Entscheidungen", description: "Simulation politischer Entscheidungen anhand simulierter Folgen zur Verdeutlichung politischer Komplexität.", link: "https://gemini.google.com/gem/1EwlDFvFQpZBih23NmdYPPwzBuR2s59wt?usp=sharing", category: "Politik", icon: "network" },
            { id: 8, title: "Teach a Robot (Oberstufe)", description: "Das Gem agiert als Roboter mit gelöschtem Speicher. Nutzer müssen das Wissen wiederherstellen.", link: "https://gemini.google.com/gem/1w92C8w42ecoyI5VfugDrmICxCtt7xb7h?usp=sharing", category: "Lernen", icon: "cpu" },
            { id: 9, title: "Teach a Robot (Mittelstufe)", description: "Angepasste Version des Robot-Szenarios für die Mittelstufe zur Wissensfestigung.", link: "https://gemini.google.com/gem/1n6ru5NhZ_STGlNvDQUatYzC5h5kztoif?usp=sharing", category: "Lernen", icon: "cpu" },
            { id: 10, title: "Document Architect", description: "Tool zur Umwandlung von Dokumenten oder Text in PDF nach festgelegten Designvorgaben.", link: "https://gemini.google.com/gem/1HtRVv-Om6lckykSjlApxKV-Kul-STeQg?usp=sharing", category: "Tools", icon: "file-text" },
            { id: 12, title: "10 Fragen Kontest", description: "Generiert 10 Fragen mit steigender Schwierigkeit und teilt Klassen in Wettbewerbs-Gruppen ein.", link: "https://gemini.google.com/gem/1zY8dKq6LmX1bF7clQLI_zjecLdvRtpBQ?usp=sharing", category: "Gamification", icon: "trophy" }
        ];

        const TOOLS_LIST = [
            { id: "material", category: "Unterricht & Material", icon: "file-text", items: [
                { name: "NotebookLM", url: "https://notebooklm.google.com", desc: "KI-Lernberater auf Basis bereitgestellter Dokumente. Erstellt Audio-Zusammenfassungen und Fachlandkarten." },
                { name: "MagicSchool.ai", url: "https://www.magicschool.ai", desc: "All-in-One: Unterrichtspläne, differenzierte Texte und IEP-Vorschläge." },
                { name: "Diffit", url: "https://web.diffit.me", desc: "Wandelt jeden Text in Materialpakete für spezifische Leseniveaus um." },
                { name: "Claude.ai", url: "https://claude.ai", desc: "Besonders natürlicher Schreibstil für komplexe pädagogische Texte." },
                { name: "Eduaide.ai", url: "https://www.eduaide.ai", desc: "Über 100 Ressourcen-Typen zur Unterrichtsgestaltung und Gamification." }
            ]},
            { id: "recherche", category: "Recherche & Fakten", icon: "search", items: [
                { name: "Perplexity", url: "https://www.perplexity.ai/", desc: "Echtzeitrecherche mit Quellenangaben. Fokus auf Transparenz und Fakten." },
                { name: "Use.ai", url: "https://use.ai/", desc: "Nutzung aller gängigen LLM Modelle im Wechsel oder Vergleich." },
                { name: "Google Gemini", url: "https://gemini.google.com", desc: "Sprachmodell für Gems, Bilder, Videos und Coding." },
                { name: "Consensus", url: "https://consensus.app", desc: "Suchmaschine ausschließlich basierend auf wissenschaftlichen Studien." },
                { name: "Scite.ai", url: "https://scite.ai", desc: "Prüfung der Zitierhistorie und Validität wissenschaftlicher Aussagen." }
            ]},
            { id: "medien", category: "Visualisierung & Medien", icon: "image", items: [
                { name: "Napkin.ai", url: "https://www.napkin.ai/", desc: "Generierung von vielfältig anpassbaren Visualisierungen aus Texten." },
                { name: "Playground", url: "https://playground.com/", desc: "Grafikdesign und Bildgenerierung mit Editierfunktionen." },
                { name: "Mureka.ai", url: "https://www.mureka.ai/", desc: "Generierung von Songs und Liedern nach individuellen Vorgaben." },
                { name: "Gamma.app", url: "https://gamma.app", desc: "Erstellt Präsentationen, Webseiten oder Dokumente aus Text." },
                { name: "HeyGen", url: "https://www.heygen.com", desc: "Videogenerator für sprechende Avatare." },
                { name: "Canva Magic Studio", url: "https://www.canva.com", desc: "Integrierte KI-Design-Tools für Layouts und Bilder." }
            ]},
            { id: "interaktion", category: "Aktivierung", icon: "users", items: [
                { name: "Mizou", url: "https://mizou.com", desc: "Geschützte KI-Tutoren für Schüler (Hilfe zur Selbsthilfe)." },
                { name: "Curipod", url: "https://curipod.com", desc: "Interaktive Präsentationsplattform mit Sofort-Auswertung." },
                { name: "Conker.ai", url: "https://www.conker.ai", desc: "Blitzschnelles Tool für Quizze." },
                { name: "DeepL Write", url: "https://www.deepl.com/write", desc: "Verbesserung von Grammatik, Stil und Ausdruck." }
            ]},
            { id: "schueler", category: "Schüler-Spezial", icon: "graduation-cap", items: [
                { name: "Khan Academy", url: "https://www.khanacademy.org", desc: "KI-Lerncoach (Khanmigo) nach Sokratik-Prinzip." },
                { name: "Quizlet Q-Chat", url: "https://quizlet.com", desc: "Interaktiver Lernchat zur Abfrage von Karteikarten." },
                { name: "Goblin.tools", url: "https://goblin.tools", desc: "Zerlegt Aufgaben in winzige Checklisten-Schritte." },
                { name: "StudySmarter", url: "https://www.studysmarter.de", desc: "Erstellt Karteikarten aus hochgeladenen Unterlagen." }
            ]}
        ];

        const WORKFLOW_GROUPS = [
            { id: "lehrkraefte", title: "Lehrkräfte", icon: "users", items: [
                { 
                    title: "Differenzierte Materialerstellung", 
                    desc: "Methodischer Weg zur Erstellung von Lernmaterial für heterogene Lerngruppen.", 
                    steps: [
                        { tool: "Perplexity", action: "Recherche", detail: "Nutze Perplexity für die Faktenprüfung. Gib komplexe Fragen ein, um verlässliche Quellen und Daten für dein Thema zu erhalten." }, 
                        { tool: "Diffit", action: "Niveaustufen", detail: "Lade die Quellen bei Diffit hoch. Erstelle Lesetexte, Vokabelhilfen und Verständnisfragen, exakt angepasst auf das Leseprofil deiner Lerngruppe." }, 
                        { tool: "Napkin.ai", action: "Visualisierung", detail: "Kopiere Kerninhalte in Napkin.ai, um automatisch Infografiken oder Prozessdiagramme zu erzeugen, die das Verständnis fördern." }, 
                        { tool: "DeepL Write", action: "Sprachschliff", detail: "Prüfe die fertigen Texte auf pädagogische Präzision und grammatikalische Korrektheit für einen professionellen Auftritt." }
                    ] 
                },
                { 
                    title: "Sokratische Lernumgebung", 
                    desc: "Förderung des selbstständigen Denkens durch geführte KI-Dialoge.", 
                    steps: [
                        { tool: "NotebookLM", action: "Strukturierung", detail: "Erstelle ein Notebook mit deinen Unterrichtsinhalten. Die KI fungiert als Experte für genau dieses Material." }, 
                        { tool: "Mizou", action: "KI-Coach", detail: "Konfiguriere einen Bot, der Schülern keine Lösungen gibt, sondern durch 'Gegenfragen' den Erkenntnisprozess steuert." }, 
                        { tool: "Conker.ai", action: "Lernerfolgs-Check", detail: "Erzeuge am Ende ein KI-Quiz, um zu validieren, ob die Schüler die Kernkonzepte durch den Dialog verinnerlicht haben." }
                    ] 
                },
                { 
                    title: "Historische Kontexte lebendig machen", 
                    desc: "Nutzung von Multimedia-KI für immersives Lernen.", 
                    steps: [
                        { tool: "Gemini", action: "Skriptbau", detail: "Lasse Gemini ein fiktives Interview oder einen Monolog aus der Perspektive einer historischen Person verfassen lassen." }, 
                        { tool: "Playground", action: "Visualisierung", detail: "Generiere ein fotorealistisches oder historisch anmutendes Porträt dieser Person für die visuelle Unterstützung." }, 
                        { tool: "HeyGen", action: "Avatar-Video", detail: "Kombiniere Bild und Skript in HeyGen. Die Person im Bild spricht nun den Text lippensynchron als Erklärvideo." }
                    ] 
                }
            ]},
            { id: "schueler", title: "Schüler", icon: "graduation-cap", items: [
                { 
                    title: "Strukturierung von Lernprojekten", 
                    steps: [
                        { tool: "Goblin.tools", action: "Magic Todo", detail: "Ein Thema wie 'Hausarbeit' eingeben und in winzige, machbare Aufgaben zerlegen lassen. Das hilft gegen Prokrastination." }, 
                        { tool: "Perplexity", action: "Quellen-Suche", detail: "Suche nach Belegen für deine Thesen. Nutze die direkten Links, um dein Literaturverzeichnis sauber aufzubauen." }, 
                        { tool: "Napkin.ai", action: "Gliederung", detail: "Bringe deine Notizen in eine visuelle Gliederung. So erkennst du logische Lücken in deiner Argumentation sofort." }
                    ] 
                },
                { 
                    title: "Strategische Prüfungsvorbereitung", 
                    steps: [
                        { tool: "StudySmarter", action: "KI-Lernplan", detail: "Scanne deine Unterlagen ein. Die KI erstellt einen Lernplan und prüft dich mit automatisch generierten Karteikarten ab." }, 
                        { tool: "Quizlet Q-Chat", action: "Wissenstest", detail: "Gehe in den Q-Chat Dialog. Erkläre der KI die Konzepte – wenn du es ihr erklären kannst, hast du es verstanden." }, 
                        { tool: "NotebookLM", action: "Audio-Guide", detail: "Lasse die KI aus deinen Mitschriften einen Lern-Podcast erstellen. Ideal, um den Stoff auf dem Schulweg zu wiederholen." }
                    ] 
                }
            ]}
        ];

        // --- COMPONENTS ---

        const Modal = ({ title, isOpen, onClose, children }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-deep-slate/80 backdrop-blur-md">
                    <div className="bg-white rounded-4xl w-full max-w-2xl max-h-[85vh] overflow-hidden flex flex-col shadow-2xl animate-in text-deep-slate">
                        <div className="flex items-center justify-between p-6 border-b border-slate-100">
                            <h3 className="text-xl font-extrabold tracking-tight uppercase">{title}</h3>
                            <button onClick={onClose} className="p-2 hover:bg-soft-cloud rounded-full transition-colors text-bsb-green">
                                <Icon name="x" className="w-6 h-6" />
                            </button>
                        </div>
                        <div className="p-8 overflow-y-auto leading-relaxed space-y-4 font-medium">
                            {children}
                        </div>
                    </div>
                </div>
            );
        };

        const HorizontalNav = ({ items, activeId, onSelect }) => (
            <div className="flex overflow-x-auto no-scrollbar pb-4 -mx-4 px-4 md:mx-0 md:px-0">
                <div className="mobile-nav-fix p-1.5 rounded-3xl border border-slate-200 bg-white/50 min-w-max md:w-full">
                    {items.map(item => (
                        <button
                            key={item.id}
                            onClick={() => onSelect(item.id)}
                            className={`flex items-center gap-2 px-6 py-3 rounded-2xl font-bold transition-all whitespace-nowrap flex-shrink-0 ${
                                activeId === item.id 
                                ? 'bg-bsb-green text-white shadow-lg shadow-bsb-green/20 scale-100' 
                                : 'text-deep-slate hover:bg-white hover:text-bsb-green'
                            }`}
                        >
                            <Icon name={item.icon || 'circle'} className="w-4 h-4" />
                            <span className="uppercase tracking-widest text-[10px]">{item.label || item.category || item.title}</span>
                        </button>
                    ))}
                </div>
            </div>
        );

        function App() {
            const [activeTab, setActiveTab] = useState('gems');
            const [gemFilter, setGemFilter] = useState('Alle');
            const [activeToolboxCat, setActiveToolboxCat] = useState('material');
            const [activeWorkflowGroup, setActiveWorkflowGroup] = useState('lehrkraefte');
            const [showImpressum, setShowImpressum] = useState(false);
            const [showDatenschutz, setShowDatenschutz] = useState(false);
            const [visitorCount, setVisitorCount] = useState(null);

            const gemCategories = ['Alle', ...new Set(GEMS_DATA.map(g => g.category))];
            const filteredGems = gemFilter === 'Alle' ? GEMS_DATA : GEMS_DATA.filter(g => g.category === gemFilter);

            useEffect(() => {
                const initAnalytics = async () => {
                    try {
                        const firebaseConfig = JSON.parse(__firebase_config);
                        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
                        const auth = firebase.auth();
                        const db = firebase.firestore();
                        const appId = typeof __app_id !== 'undefined' ? __app_id : 'ki-lern-werkstatt';

                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }

                        const statsRef = db.doc(`artifacts/${appId}/public/data/analytics/counter/global`);
                        await statsRef.set({ hits: firebase.firestore.FieldValue.increment(1) }, { merge: true });
                        statsRef.onSnapshot((doc) => { if (doc.exists) setVisitorCount(doc.data().hits); });
                    } catch (e) {}
                };
                initAnalytics();
            }, []);

            return (
                <div className="min-h-screen bg-soft-cloud flex flex-col selection:bg-bsb-green/20">
                    <Modal title="Impressum" isOpen={showImpressum} onClose={() => setShowImpressum(false)}>
                        <p className="font-bold underline text-bsb-green uppercase tracking-tighter">Angaben gemäß § 5 TMG:</p>
                        <p className="text-lg font-extrabold">Christian Neugebauer</p>
                        <p className="text-slate-500 font-bold">Berufliche Schulen Bebra</p>
                        <p className="font-bold pt-4">Kontakt:</p>
                        <p className="flex items-center gap-2 font-medium hover:text-bsb-green transition-colors font-bold"><Icon name="mail" className="w-4 h-4 text-bsb-green" /> cneugebauer@gmx.net</p>
                    </Modal>

                    <Modal title="Datenschutz" isOpen={showDatenschutz} onClose={() => setShowDatenschutz(false)}>
                        <p className="font-medium">Dies ist eine rein statische Informationsseite. Es werden keine personenbezogenen Daten erhoben.</p>
                    </Modal>

                    <header className="glass-header sticky top-0 z-[60] py-4 border-b border-white/10 shadow-2xl">
                        <div className="max-w-7xl mx-auto px-6 flex flex-col md:flex-row items-center justify-between gap-6">
                            <div className="flex items-center gap-4 self-start md:self-auto">
                                <img src="logo.png" alt="BSB Logo" className="h-10 md:h-12 w-auto object-contain bg-white/10 rounded-lg p-1" onError={(e) => {e.target.style.display='none'}} />
                                <div className="border-l border-white/20 pl-4">
                                    <h1 className="text-xl font-extrabold tracking-tighter uppercase leading-none text-white">KI-LERN-WERKSTATT</h1>
                                </div>
                            </div>
                            <HorizontalNav 
                                items={[
                                    { id: 'gems', label: 'Eigene Gems', icon: 'layout' },
                                    { id: 'tools', label: 'KI-Toolbox', icon: 'search' },
                                    { id: 'workflows', label: 'Workflows', icon: 'rocket' }
                                ]}
                                activeId={activeTab}
                                onSelect={setActiveTab}
                            />
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-6 py-12 md:py-20 flex-grow w-full">
                        {activeTab === 'gems' && (
                            <div className="animate-in">
                                <div className="mb-14">
                                    <div className="flex items-center gap-4 mb-8">
                                        <div className="w-12 h-2 bg-bsb-green rounded-full shadow-lg" />
                                        <h2 className="text-4xl font-extrabold tracking-tighter uppercase text-deep-slate">Meine Gems</h2>
                                    </div>
                                    <HorizontalNav items={gemCategories.map(cat => ({ id: cat, label: cat }))} activeId={gemFilter} onSelect={setGemFilter} />
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
                                    {filteredGems.map(gem => (
                                        <div key={gem.id} className="bg-white border border-slate-100 rounded-[2.5rem] p-8 hover:border-bsb-green hover:shadow-2xl transition-all duration-500 flex flex-col h-full shadow-sm group">
                                            <div className="inline-flex items-center justify-center p-4 rounded-3xl gem-gradient mb-6 text-white shadow-xl shadow-bsb-green/10">
                                                <Icon name={gem.icon} className="w-7 h-7" />
                                            </div>
                                            <div className="flex-grow">
                                                <span className="text-[10px] uppercase font-black text-bsb-green bg-bsb-green/10 px-3 py-1.5 rounded-full tracking-widest">{gem.category}</span>
                                                <h3 className="text-2xl font-extrabold mt-5 mb-4 text-deep-slate group-hover:text-bsb-green transition-colors tracking-tight">{gem.title}</h3>
                                                <p className="text-slate-500 text-sm mb-8 leading-relaxed font-medium">{gem.description}</p>
                                            </div>
                                            <a href={gem.link} target="_blank" rel="noopener noreferrer" className="flex items-center justify-center gap-2 w-full py-4 bg-bsb-green hover:bg-deep-slate text-white rounded-2xl font-extrabold transition-all shadow-xl uppercase text-[10px] tracking-[0.2em]">
                                                Gem öffnen <Icon name="external-link" className="w-4 h-4" />
                                            </a>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === 'tools' && (
                            <div className="animate-in">
                                <div className="mb-14">
                                    <div className="flex items-center gap-4 mb-8">
                                        <div className="w-12 h-2 bg-action-blue rounded-full shadow-lg shadow-action-blue/20" />
                                        <h2 className="text-4xl font-extrabold tracking-tighter uppercase text-deep-slate text-center md:text-left">KI Toolbox</h2>
                                    </div>
                                    <HorizontalNav items={TOOLS_LIST} activeId={activeToolboxCat} onSelect={setActiveToolboxCat} />
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                    {TOOLS_LIST.find(c => c.id === activeToolboxCat).items.map((tool, idx) => (
                                        <a key={idx} href={tool.url} target="_blank" rel="noopener noreferrer" className="p-8 bg-white border border-slate-100 rounded-[2.5rem] hover:shadow-2xl hover:border-action-blue transition-all duration-500 shadow-sm flex flex-col justify-between group">
                                            <div>
                                                <div className="flex justify-between items-center mb-6">
                                                    <h4 className="font-extrabold text-lg text-deep-slate group-hover:text-action-blue transition-colors uppercase tracking-tight">{tool.name}</h4>
                                                    <div className="p-2.5 bg-soft-cloud rounded-xl text-slate-300 group-hover:text-action-blue transition-colors">
                                                        <Icon name="external-link" className="w-5 h-5" />
                                                    </div>
                                                </div>
                                                <p className="text-slate-500 text-sm font-medium leading-relaxed italic">{tool.desc}</p>
                                            </div>
                                        </a>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === 'workflows' && (
                            <div className="animate-in">
                                <div className="mb-14 text-center md:text-left">
                                    <div className="flex items-center gap-4 mb-8">
                                        <div className="w-12 h-2 bg-aha-orange rounded-full shadow-lg shadow-aha-orange/20" />
                                        <h2 className="text-4xl font-extrabold tracking-tighter uppercase text-deep-slate text-center md:text-left">Workflows</h2>
                                    </div>
                                    <HorizontalNav items={WORKFLOW_GROUPS.map(g => ({ id: g.id, label: g.title, icon: g.icon }))} activeId={activeWorkflowGroup} onSelect={setActiveWorkflowGroup} />
                                </div>
                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-12">
                                    {WORKFLOW_GROUPS.find(g => g.id === activeWorkflowGroup).items.map((wf, idx) => (
                                        <div key={idx} className="bg-white p-10 rounded-[3rem] border border-slate-100 shadow-sm relative overflow-hidden h-full flex flex-col group hover:border-aha-orange transition-all duration-300">
                                            <div className="absolute top-0 right-0 w-48 h-48 opacity-[0.03] bg-aha-orange rounded-bl-full -mr-16 -mt-16 transition-transform group-hover:scale-110"></div>
                                            <div className="mb-10 relative z-10 text-center md:text-left">
                                                <span className="text-[9px] font-black text-aha-orange bg-aha-orange/10 px-3 py-1 rounded-full uppercase tracking-[0.3em] mb-4 inline-block">Best Practice</span>
                                                <h4 className="font-extrabold text-3xl text-deep-slate uppercase tracking-tighter leading-tight">{wf.title}</h4>
                                                {wf.desc && <p className="text-slate-400 text-sm italic mt-2">{wf.desc}</p>}
                                            </div>
                                            <div className="space-y-12 relative z-10 flex-grow">
                                                {wf.steps.map((step, sIdx) => (
                                                    <div key={sIdx} className="relative">
                                                        <div className="flex items-start gap-8">
                                                            <div className="w-14 h-14 rounded-[1.25rem] bg-soft-cloud text-deep-slate flex items-center justify-center shrink-0 border border-slate-100 font-mono text-xl shadow-inner group-hover:bg-aha-orange group-hover:text-white group-hover:border-aha-orange transition-all duration-300">{sIdx + 1}</div>
                                                            <div className="flex-grow pt-1">
                                                                <div className="flex items-center gap-4 mb-2">
                                                                    <span className="text-[11px] font-black text-deep-slate uppercase tracking-widest">{step.tool}</span>
                                                                    <div className="h-0.5 bg-slate-50 flex-grow rounded-full"></div>
                                                                </div>
                                                                <div className="text-[10px] font-bold text-action-blue uppercase tracking-[0.2em] mb-4">{step.action}</div>
                                                                <p className="text-sm text-slate-500 font-medium leading-relaxed bg-soft-cloud/40 p-4 rounded-2xl border border-slate-100/50">{step.detail}</p>
                                                            </div>
                                                        </div>
                                                        {sIdx < wf.steps.length - 1 && <div className="absolute left-7 top-14 w-0.5 h-12 bg-slate-50 ml-[-1px]"></div>}
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* FOOTER */}
                    <footer className="bg-deep-slate py-20 mt-20 text-white">
                        <div className="max-w-7xl mx-auto px-6 text-center">
                            <div className="flex flex-col md:flex-row justify-between items-center gap-16 mb-16">
                                <div className="flex items-center gap-5">
                                    <div className="bg-bsb-green p-3 rounded-2xl shadow-xl shadow-bsb-green/10 transform hover:rotate-12 transition-transform">
                                        <Icon name="sparkles" className="w-7 h-7 text-white" />
                                    </div>
                                    <div className="text-left">
                                        <span className="font-extrabold text-2xl tracking-tighter uppercase block leading-none">KI-LERN-WERKSTATT</span>
                                        <span className="text-[10px] text-slate-400 font-bold tracking-[0.4em] uppercase mt-2 block tracking-widest">Christian Neugebauer • Berufliche Schulen Bebra</span>
                                    </div>
                                </div>
                                <div className="flex flex-wrap justify-center gap-12 text-[10px] font-bold text-slate-400 uppercase tracking-[0.3em]">
                                    <button onClick={() => setShowImpressum(true)} className="hover:text-bsb-green transition-colors">Impressum</button>
                                    <button onClick={() => setShowDatenschutz(true)} className="hover:text-bsb-green transition-colors">Datenschutz</button>
                                    <a href="mailto:cneugebauer@gmx.net" className="hover:text-bsb-green flex items-center gap-3 transition-colors group font-bold">
                                        <Icon name="mail" className="w-5 h-5 group-hover:scale-110" /> Kontakt
                                    </a>
                                </div>
                            </div>
                            <div className="pt-12 border-t border-white/5 flex flex-col md:flex-row items-center justify-center gap-6">
                                {visitorCount !== null && (
                                    <div className="flex items-center gap-3 bg-white/5 px-4 py-2 rounded-full border border-white/10">
                                        <div className="w-1.5 h-1.5 bg-bsb-green rounded-full animate-pulse shadow-[0_0_8px_#6BB745]"></div>
                                        <span className="text-[10px] font-mono tracking-wider uppercase font-bold text-white opacity-60">Besuche: {visitorCount.toLocaleString('de-DE')}</span>
                                    </div>
                                )}
                            </div>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
